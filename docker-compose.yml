version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: pngworld-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: pngworld-meilisearch
    environment:
      - MEILI_ENV=development
      - MEILI_MASTER_KEY=masterKey123!
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  redis_data:
  meilisearch_data:
